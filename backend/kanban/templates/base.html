<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mthds Board{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
    <style type="text/tailwindcss">
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            @apply w-full bg-[#22272b] text-[#b6c2cf] text-sm border border-[#738496] rounded px-3 py-2 transition-all focus:outline-none focus:border-[#579dff] focus:ring-1 focus:ring-[#579dff] placeholder-[#8c9bab];
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 font-sans h-screen flex flex-col selection:bg-blue-500/30">
    {% block navbar %}
    <nav
        class="h-14 bg-gray-800 border-b border-gray-700/50 px-4 flex items-center justify-between shrink-0 shadow-sm z-10 w-full">
        <div class="flex items-center gap-4">
            <a href="{% url 'dashboard' %}"
                class="flex items-center gap-2 bg-gray-700/50 px-3 py-1.5 rounded-md hover:bg-gray-700 cursor-pointer transition-colors">
                <div
                    class="w-5 h-5 bg-gradient-to-br from-blue-400 to-blue-600 rounded flex items-center justify-center shadow-inner">
                    <div class="w-1.5 h-2.5 bg-white rounded-sm drop-shadow"></div>
                </div>
                <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-100 to-gray-300">
                    Mthds Board
                </h1>
            </a>
        </div>
        <div class="flex items-center gap-3">
            {% if user.is_authenticated %}
            <span class="text-sm text-gray-300">Welcome, {{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}?next=/accounts/login/">
                {% csrf_token %}
                <button type="submit"
                    class="px-3 py-1.5 text-sm font-medium bg-red-600/20 text-red-400 hover:bg-red-600/30 rounded-md transition-colors border border-red-500/20 shadow-sm">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}"
                class="px-3 py-1.5 text-sm font-medium text-gray-300 hover:bg-gray-700/50 rounded-md transition-colors">Login</a>
            <a href="{% url 'register' %}"
                class="px-3 py-1.5 text-sm font-medium bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 rounded-md transition-colors border border-blue-500/20 shadow-sm">Register</a>
            {% endif %}
        </div>
    </nav>
    {% endblock %}
    <main class="flex-1 w-full flex flex-col overflow-hidden relative">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
