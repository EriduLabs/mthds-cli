{% extends 'kanban/dashboard.html' %}

{% block dashboard_content %}
<div class="bg-[#282e33] rounded p-6 shadow-sm border border-[#333c43]">
    <h2 class="text-xl font-bold text-[#b6c2cf] mb-2">Workspace Settings</h2>
    <p class="text-[#8c9bab] text-sm mb-4">Manage workspace configurations, visibility, and privacy preferences.</p>
    <div class="space-y-4 max-w-sm">
        <div>
            <label class="block text-xs font-bold text-[#8c9bab] mb-1.5">Workspace Name</label>
            <input type="text" value="{{ user.username }}'s Workspace" disabled
                class="w-full bg-[#22272b] border border-[#333c43] rounded px-3 py-2 text-sm text-[#b6c2cf]">
        </div>
        <div>
            <label class="block text-xs font-bold text-[#8c9bab] mb-1.5">Short Name</label>
            <input type="text" value="{{ user.username|lower }}" disabled
                class="w-full bg-[#22272b] border border-[#333c43] rounded px-3 py-2 text-sm text-[#b6c2cf]">
        </div>
    </div>
</div>
{% endblock dashboard_content %}
